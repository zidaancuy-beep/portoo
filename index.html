<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio Zaidaan</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Urbanist:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0d0d12; --accent: #00adb5; --fire: #ff4d00; --text: #f0f0f0; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Urbanist', sans-serif; overflow: hidden; height: 100vh; width: 100vw; }
        
        nav { position: fixed; top: 0; left: 0; width: 100%; padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; z-index: 9999; background: linear-gradient(to bottom, var(--bg), transparent); }
        .logo { font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; color: var(--accent); cursor: pointer; }
        .nav-links { display: flex; gap: 10px; }
        .nav-item { background: none; border: none; color: #aaa; font-weight: 600; font-family: 'Space Grotesk', sans-serif; padding: 8px 12px; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--accent) !important; text-shadow: 0 0 8px var(--accent); }

        .main-slider { display: flex; width: 400vw; height: 100vh; transition: transform 0.8s cubic-bezier(0.85, 0, 0.15, 1); }
        .page { width: 100vw; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 0 10%; text-align: center; flex-shrink: 0; }
        
        /* Multi-Rocket System */
        .rocket-fleet { position: fixed; bottom: -150px; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; }
        .rocket { position: absolute; font-size: 4.5rem; bottom: -150px; filter: drop-shadow(0 0 15px var(--fire)); opacity: 0; }
        
        .r1 { left: 40%; }
        .r2 { left: 50%; font-size: 5rem; }
        .r3 { left: 60%; }

        /* Kelas Animasi Vertikal Mulus */
        .launch .r1 { animation: flyUp 0.9s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        .launch .r2 { animation: flyUp 1.1s cubic-bezier(0.25, 1, 0.5, 1) 0.15s forwards; }
        .launch .r3 { animation: flyUp 1s cubic-bezier(0.25, 1, 0.5, 1) 0.05s forwards; }

        @keyframes flyUp {
            0% { bottom: -150px; opacity: 1; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { bottom: 120%; opacity: 0; transform: scale(1); }
        }

        .card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); padding: 30px; border-radius: 20px; max-width: 500px; width: 100%; margin-top: 15px; backdrop-filter: blur(10px); }
        .stat-container { display: flex; justify-content: center; margin-top: 20px; }
        .stat-box h3 { font-family: 'Space Grotesk', sans-serif; font-size: 2.5rem; color: var(--accent); }
        .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 400px; margin-top: 20px; }
        .contact-grid a { text-align: center; padding: 12px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); color: #fff; text-decoration: none; font-weight: 600; border-radius: 12px; }
    </style>
</head>
<body>

    <div id="fleet" class="rocket-fleet">
        <div class="rocket r1">🚀</div>
        <div class="rocket r2">🚀</div>
        <div class="rocket r3">🚀</div>
    </div>

    <nav>
        <div class="logo" onclick="goToPage(0)">Zaidaan.</div>
        <div class="nav-links">
            <button class="nav-item active" id="link-0" onclick="goToPage(0)">Home</button>
            <button class="nav-item" id="link-1" onclick="goToPage(1)">Tentang</button>
            <button class="nav-item" id="link-2" onclick="goToPage(2)">Karya</button>
            <button class="nav-item" id="link-3" onclick="goToPage(3)">Kontak</button>
        </div>
    </nav>

    <div class="main-slider" id="slider">
        <div class="page">
            <h1 style="font-size: 2.5rem; margin-bottom: 10px;">Zaidaan Rizqullah H.</h1>
            <p style="color: var(--accent); font-weight:600;">Tech Enthusiast | Digital Creator</p>
        </div>
        <div class="page">
            <div class="card">
                <h2>Tentang Saya</h2>
                <p style="opacity: 0.8; margin-top: 10px;">Kreator konten berbasis di Surabaya yang fokus pada pengembangan front-end design dan kepenulisan kreatif.</p>
            </div>
        </div>
        <div class="page">
            <h2>@semogarilet</h2>
            <div class="card">
                <div class="stat-container">
                    <div class="stat-box">
                        <h3>50K+</h3>
                        <p>Total Likes</p>
                    </div>
                </div>
                <a href="https://www.tiktok.com/@semogarilet" target="_blank" style="color: var(--accent); text-decoration: none; display: inline-block; margin-top: 20px;">Kunjungi TikTok →</a>
            </div>
        </div>
        <div class="page">
            <h2>Mari Terhubung</h2>
            <div class="contact-grid">
                <a href="mailto:zidaancuy@gmail.com">Email</a>
                <a href="https://instagram.com/zidaanherlambang" target="_blank">Instagram</a>
                <a href="https://wa.me/6285755882918" target="_blank">WhatsApp</a>
                <a href="https://github.com/zidaancuy-beep" target="_blank">GitHub</a>
            </div>
        </div>
    </div>

    <script>
        const slider = document.getElementById('slider');
        const fleet = document.getElementById('fleet');
        
        function goToPage(index) {
            document.querySelectorAll('.nav-links .nav-item').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`link-${index}`).classList.add('active');
            
            // Geser slider halaman ke samping
            slider.style.transform = `translateX(-${index * 100}vw)`;
            
            // Picu luncuran 3 roket vertikal secara bersamaan dengan delay
            fleet.classList.remove('launch');
            void fleet.offsetWidth; 
            fleet.classList.add('launch');
        }
    </script>
</body>
</html>
